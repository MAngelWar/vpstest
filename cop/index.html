<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tienda Estática Moderna</title>
  <style>
    /* Reset y base */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    header {
      width: 100%;
      max-width: 1200px;
      background-color: #1e40af;
      color: white;
      padding: 1.5rem 2rem;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(30, 64, 175, 0.4);
      text-align: center;
      font-weight: 700;
      font-size: 2rem;
      letter-spacing: 1.2px;
      margin-bottom: 30px;
      user-select: none;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-family: 'Poppins', sans-serif;
    }
    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 25px;
      width: 100%;
      max-width: 1200px;
    }
    .product {
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(30, 64, 175, 0.15);
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
    }
    .product:hover {
      transform: translateY(-10px);
      box-shadow: 0 12px 30px rgba(30, 64, 175, 0.3);
      border-color: #3b82f6;
    }
    .product img {
      width: 100%;
      max-width: 260px;
      border-radius: 16px;
      margin-bottom: 15px;
      object-fit: cover;
      box-shadow: 0 4px 12px rgba(30, 64, 175, 0.2);
      transition: transform 0.3s ease;
    }
    .product:hover img {
      transform: scale(1.05);
    }
    .product h3 {
      font-size: 1.6rem;
      margin-bottom: 10px;
      color: #1e40af;
      font-weight: 700;
      font-family: 'Poppins', sans-serif;
    }
    .product p {
      font-size: 1rem;
      color: #555;
      text-align: center;
      margin-bottom: 15px;
      line-height: 1.5;
      font-family: 'Open Sans', sans-serif;
    }
    .price {
      font-weight: 700;
      font-size: 1.4rem;
      color: #ef4444;
      margin-bottom: 20px;
      font-family: 'Poppins', sans-serif;
    }
    .btn {
      background: #1e40af;
      color: white;
      padding: 14px 30px;
      border: none;
      border-radius: 30px;
      font-weight: 700;
      font-size: 1.1rem;
      text-decoration: none;
      text-align: center;
      width: 100%;
      max-width: 260px;
      transition: background 0.3s ease, box-shadow 0.3s ease;
      user-select: none;
      box-shadow: 0 4px 15px rgba(30, 64, 175, 0.4);
      font-family: 'Poppins', sans-serif;
    }
    .btn:hover {
      background: #3b82f6;
      box-shadow: 0 6px 20px rgba(59, 130, 246, 0.6);
    }
    @media (max-width: 480px) {
      header {
        font-size: 1.5rem;
        padding: 1rem;
      }
      .btn {
        padding: 12px 25px;
        font-size: 1rem;
      }
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    Mi Tienda Moderna
  </header>

  <div class="container">
    <div class="product">
      <img src="assets/img/logo.png" alt="Producto 1">
      <h3>Producto 1</h3>
      <p>Descripción breve del producto con un toque moderno y atractivo.</p>
      <div class="price">$20.00</div>
      <a href="#" class="btn">Comprar</a>
    </div>

    <div class="product">
      <img src="https://via.placeholder.com/260" alt="Producto 2">
      <h3>Producto 2</h3>
      <p>Descripción breve del producto con un toque moderno y atractivo.</p>
      <div class="price">$35.00</div>
      <a href="#" class="btn">Comprar</a>
    </div>

    <div class="product">
      <img src="https://via.placeholder.com/260" alt="Producto 3">
      <h3>Producto 3</h3>
      <p>Descripción breve del producto con un toque moderno y atractivo.</p>
      <div class="price">$50.00</div>
      <a href="#" class="btn">Comprar</a>
    </div>
  </div>
</body>
</html>
